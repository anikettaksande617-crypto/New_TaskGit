<!DOCTYPE html>
<html>
<head>
    <title>Todo Form</title>
</head>
<body>

<h2>Create Todo Item</h2>

<form method="POST">

    <label>Item Name</label>
    <input type="text" name="itemName">

    <br><br>

    <label>Item Description</label>
    <textarea name="itemDescription"></textarea>

    <br><br>

    <button type="submit">
        Submit
    </button>

</form>

</body>
</html>
